{% extends "read_tune/layout.html" %}
{% block body %}




<div class="container-fluid">
    <div class="justify-content-center ">
        <div class="playlist_generated mx-auto">
            <h3>Your playlist is ready <span>&#x1F431;&#x200D;&#x1F453;</span>!</h3>
            <div class="d-flex flex-column justify-content-center ">
                <h5 class="text-center mb-2 text-break">
                    {{playlist.title}}
                </h5>
                <iframe height="300px" width="100%" src="https://www.youtube.com/embed/playlist?list={{playlist.id}}"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen showInfo="1"></iframe>
                <a type="button" class="btn btn-primary mt-2" href="{% url 'index' %}">Go Home Page</a>
                <a type="button" class="btn btn-primary mt-2"
                    href="https://www.youtube.com/playlist?list={{playlist.id}}" target="_blank">Open Playlist</a>
            </div>
        </div>
    </div>

</div>
{% endblock %}
